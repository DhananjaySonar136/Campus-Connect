# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=campus-connect-backend

# ── Database (H2 in-memory for development) ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:campusconnectdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# WARNING: Change this in production! Use: openssl rand -hex 32
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=604800000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.campusconnect=DEBUG
logging.level.org.springframework.security=WARN

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION (PostgreSQL) — uncomment below, comment out H2 block above
